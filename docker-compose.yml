version: "3.9"

services:
  aggregator:
    build: ./aggregator
    image: uts-aggregator:latest
    environment:
      DATABASE_URL: postgres://uts:utspass@storage:5432/utsdb
      REDIS_URL: redis://broker:6379/0
      CONSUMER_WORKERS: "3"
      LOG_LEVEL: INFO
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz').read()"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  publisher:
    build: ./publisher
    image: uts-publisher:latest
    environment:
      TARGET_URL: http://aggregator:8080/publish
      COUNT: "20000"
      DUP_RATE: "0.4"
      BATCH_SIZE: "100"
    depends_on:
      aggregator:
        condition: service_healthy
    profiles: ["load"]

  broker:
    image: redis:7-alpine
    volumes:
      - broker_data:/data
    # TIDAK ada ports: → murni internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  storage:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: utsdb
      POSTGRES_USER: uts
      POSTGRES_PASSWORD: utspass
    volumes:
      - pg_data:/var/lib/postgresql/data
    # TIDAK ada ports: → murni internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uts -d utsdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts:ro
    command: ["run", "/scripts/loadtest.js"]
    profiles: ["load"]
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      BASE_URL: http://aggregator:8080

volumes:
  pg_data:
  broker_data:
